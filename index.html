<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>六星占術 星人鑑定</title>
  <style>
    body { margin:0; font-family: 'Yu Mincho','Hiragino Mincho ProN',serif; color:#fff; background:#2b0000; }
    .wrap { max-width:760px; margin:0 auto; padding:20px; }
    .panel { border:4px solid #c9a227; background:linear-gradient(180deg,#5a0000,#250000); padding:20px; box-shadow:0 0 0 2px #000 inset; }
    h1{ text-align:center; color:#ffd54a; font-size:2.2rem; margin:0 0 20px; letter-spacing:.08em; }
    .row{ display:flex; gap:10px; margin-bottom:14px; }
    select,button{ font-size:1rem; padding:10px; border-radius:6px; border:1px solid #b08d1a; }
    select{ flex:1; background:#1d1d1d; color:#fff; }
    button{ background:linear-gradient(180deg,#ffe27a,#c99700); color:#3a2300; font-weight:700; cursor:pointer; }
    .poster{ margin-top:20px; border:6px double #d4af37; padding:18px; background:radial-gradient(circle at center,#7a0000,#2a0000 65%); }
    .sec{ border:2px solid #b48a1b; padding:12px; margin:10px 0; background:rgba(0,0,0,.25); }
    .main-star{ font-size:3.2rem; color:#ffd54a; font-weight:700; text-align:center; line-height:1.2; }
    .year-luck{ font-size:2.2rem; color:#ffd54a; font-weight:700; }
    .danger{ font-size:3rem; font-weight:800; color:#ff2a2a; text-shadow:0 0 15px #000; text-align:center; background:#2b0000; padding:10px; }
    table{ width:100%; border-collapse:collapse; }
    td{ border:1px solid #8e6a10; padding:8px; vertical-align:top; }
    .bubble{ border:3px solid #ffd54a; color:#ffd54a; font-size:1.6rem; font-weight:700; padding:10px; text-align:center; background:#3b0000; }
    .hidden{ display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel" id="formView">
      <h1>六星占術 星人鑑定</h1>
      <div class="row"><select id="year"></select><select id="month"></select><select id="day"></select></div>
      <button id="judgeBtn">鑑定する</button>
    </div>

    <div class="poster hidden" id="resultView"></div>
  </div>

<script>
const yearEl=document.getElementById('year'),monthEl=document.getElementById('month'),dayEl=document.getElementById('day');
const nowYear=new Date().getFullYear();
for(let y=1912;y<=nowYear;y++) yearEl.add(new Option(`${y}年`,y));
for(let m=1;m<=12;m++) monthEl.add(new Option(`${m}月`,m));
for(let d=1;d<=31;d++) dayEl.add(new Option(`${d}日`,d));

const zodiacs=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const zodiacToStar={子:['土星人','＋'],丑:['水星人','－'],寅:['木星人','＋'],卯:['木星人','－'],辰:['天王星人','＋'],巳:['天王星人','－'],午:['火星人','＋'],未:['火星人','－'],申:['金星人','＋'],酉:['金星人','－'],戌:['土星人','－'],亥:['水星人','＋']};
const reigouPair={ '土星人＋':'金星人', '土星人－':'火星人','金星人＋':'天王星人','金星人－':'木星人','火星人＋':'水星人','火星人－':'土星人','天王星人＋':'金星人','天王星人－':'木星人','木星人＋':'火星人','木星人－':'水星人','水星人＋':'天王星人','水星人－':'土星人' };
const reigouZodiac={ '土星人＋':'戌','土星人－':'亥','金星人＋':'申','金星人－':'酉','火星人＋':'午','火星人－':'未','天王星人＋':'辰','天王星人－':'巳','木星人＋':'寅','木星人－':'卯','水星人＋':'子','水星人－':'丑' };
const cycle=['種子','緑生','立花','健弱','達成','乱気','再会','財成','安定','陰影','停止','減退'];
const base2026={ '土星人＋':'達成','土星人－':'乱気','金星人＋':'再会','金星人－':'財成','火星人＋':'安定','火星人－':'陰影','天王星人＋':'停止','天王星人－':'減退','木星人＋':'種子','木星人－':'緑生','水星人＋':'立花','水星人－':'健弱' };
const daisakkai=['陰影','停止','減退'];

function getLuck(starKey,targetYear){
  const baseIdx=cycle.indexOf(base2026[starKey]);
  const diff=targetYear-2026;
  return cycle[(baseIdx+diff%12+12)%12];
}
function starsByLuck(luck){ return Math.max(1,6-Math.abs(4-cycle.indexOf(luck))); }

document.getElementById('judgeBtn').onclick=()=>{
  const y=+yearEl.value,m=+monthEl.value,d=+dayEl.value;
  const zodiac=zodiacs[(y-4)%12];
  const [star,pm]=zodiacToStar[zodiac];
  const starKey=`${star}${pm}`;
  const isReigou=reigouZodiac[starKey]===zodiac;
  const luck=getLuck(starKey,nowYear);
  const da=daisakkai.includes(luck);
  const subStar=reigouPair[starKey];

  const result=document.getElementById('resultView');
  result.classList.remove('hidden');
  result.innerHTML=`
    <h1>六星占術鑑定書</h1>
    <div class="sec">${y}年${m}月${d}日</div>
    <div class="sec main-star">あなたは ${star}（${pm}）${isReigou?'霊合星':''}です</div>
    ${isReigou?`<div class="sec">霊合星とは：${subStar}の気質も併せ持つ特別な星</div>`:''}
    <div class="sec">${nowYear}年の運気：<div class="year-luck">${luck}</div></div>
    ${da?`<div class="danger">⚠️ 大殺界</div>`:''}
    <div class="sec"><b>総合鑑定</b><br>${luck}の年は判断力と行動速度が結果を分ける。${star}（${pm}）の持ち味を一点集中で使い、曖昧な約束と見切り発車を切り捨てなさい。${isReigou?`${subStar}の気質も出るため、感情の振れ幅を管理して結論を急がないこと。`:''}期限を区切って実行すれば流れは変わる。</div>
    <div class="sec"><b>五項目運勢評価</b>
    <table>
      <tr><td>総合運</td><td>${'★'.repeat(starsByLuck(luck))} 運気「${luck}」の流れに合わせ、優先順位を3つに絞るほど成果が出る。</td></tr>
      <tr><td>恋愛運</td><td>${'★'.repeat(starsByLuck(luck)-1||1)} 連絡頻度と会う日程を明確化すると関係が進む。曖昧な駆け引きは禁物。</td></tr>
      <tr><td>仕事運</td><td>${'★'.repeat(starsByLuck(luck))} 先延ばし案件の整理が評価に直結。締切を先に宣言して主導権を取ること。</td></tr>
      <tr><td>金運</td><td>${'★'.repeat(Math.max(1,starsByLuck(luck)-1))} 固定費の見直しと目的別口座の分離が効果的。衝動買いは24時間保留。</td></tr>
      <tr><td>健康運</td><td>${'★'.repeat(Math.max(1,starsByLuck(luck)-1))} 睡眠時間を一定化し、首肩と胃腸のケアを習慣化すると崩れにくい。</td></tr>
    </table></div>
    <div class="sec"><b>開運アドバイス</b><ul><li>今月中に未完了タスクを3件片付ける。</li><li>毎朝5分、今日やることを紙に書いて順番を固定する。</li><li>返信期限を自分で決め、約束を前倒しで守る。</li></ul></div>
    <div class="sec"><b>注意ポイント</b><br>勢いだけで決めると損失が拡大する。数字・期日・責任者を確認してから動くこと。</div>
    <div class="sec"><b>細木数子の一喝</b><div class="bubble">${da?'今は引きなさい':'やるなら今よ'}</div></div>
    <button onclick="location.reload()">もう一度鑑定</button>
  `;
}
</script>
</body>
</html>
